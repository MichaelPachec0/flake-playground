name: "Bump playground packages"

# Daily: re-run nvfetcher to pull the latest upstream commit of each tracked
# playground package, rebuild the `playground` check (every package builds), and
# only commit the regenerated _sources when that passes. A bump that breaks a
# build is left uncommitted. Mirrors update.yml (the vim-plugins bump).
on:
  schedule:
    - cron: '37 4 * * *'
  push:
    paths:
      - 'nix/pkgs/playground/nvfetcher.toml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Run nvfetcher
        run: |
          nix run nixpkgs#nvfetcher -- \
            -c nix/pkgs/playground/nvfetcher.toml \
            -o nix/pkgs/playground/_sources

      - name: Build checks (every playground package)
        run: nix build .#checks.x86_64-linux.playground --impure -L

      - name: Commit bumped sources
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump playground package sources"
          file_pattern: "nix/pkgs/playground/_sources/"
