name: "Bump playground packages"

# Daily: re-run nvfetcher for the tracked playground packages, rebuild the FULL
# check set, and only commit the regenerated _sources when everything passes.
on:
  schedule:
    - cron: '37 4 * * *'
  push:
    paths:
      - 'nix/pkgs/playground/nvfetcher.toml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Regenerate sources + run flake checks
        uses: ./.github/actions/nix-checks
        with:
          pre-build-command: >-
            nix run nixpkgs#nvfetcher --
            -c nix/pkgs/playground/nvfetcher.toml
            -o nix/pkgs/playground/_sources

      - name: Commit bumped sources
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump playground package sources"
          file_pattern: "nix/pkgs/playground/_sources/"
