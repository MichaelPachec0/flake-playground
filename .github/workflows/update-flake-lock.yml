name: "Update flake.lock"

# Weekly: bump the flake inputs (nixpkgs etc.), rebuild the FULL check set, and
# only commit flake.lock if everything still builds and every module still
# evaluates.
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Update inputs + run flake checks
        uses: ./.github/actions/nix-checks
        with:
          pre-build-command: "nix flake update"

      - name: Commit flake.lock
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update flake.lock"
          file_pattern: "flake.lock"
