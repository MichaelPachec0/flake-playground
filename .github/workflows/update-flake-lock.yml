name: "Update flake.lock"

# Weekly: bump the flake inputs (nixpkgs etc.), rebuild the checks, and only
# commit flake.lock if everything still builds + nvim still loads. Kept separate
# from the nightly plugin bump so nixpkgs churn is decoupled from plugin updates.
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Update flake inputs
        run: nix flake update

      - name: Build checks (every plugin + headless nvim load test)
        run: nix build .#checks.x86_64-linux.default --impure -L

      - name: Commit flake.lock
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update flake.lock"
          file_pattern: "flake.lock"
