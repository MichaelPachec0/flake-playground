name: "Bump vim plugins"

# Daily: re-run nvfetcher for the tracked vim plugins, rebuild the FULL check
# set (every package + every module eval + the headless-nvim load test), and
# only commit the regenerated _sources when everything passes.
on:
  schedule:
    - cron: '23 4 * * *'
  push:
    paths:
      - 'nix/pkgs/vimPlugins/nvfetcher.toml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Regenerate sources + run flake checks
        uses: ./.github/actions/nix-checks
        with:
          pre-build-command: >-
            nix run nixpkgs#nvfetcher --
            -c nix/pkgs/vimPlugins/nvfetcher.toml
            -o nix/pkgs/vimPlugins/_sources

      - name: Commit bumped sources
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump vim plugin sources"
          file_pattern: "nix/pkgs/vimPlugins/_sources/"
