name: "Nix flake checks"
description: "Set up Nix, optionally regenerate inputs, then build every flake check in parallel with nix-fast-build."

inputs:
  pre-build-command:
    description: "Optional shell command run after Nix is set up but before the checks build (e.g. nvfetcher or `nix flake update`). The cron bump workflows use this."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ github.token }}

    - name: Cache nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 5G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never

    - name: Regenerate inputs (optional)
      if: ${{ inputs.pre-build-command != '' }}
      shell: bash
      run: ${{ inputs.pre-build-command }}

    - name: Build all flake checks (nix-fast-build)
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: "1"
      run: |
        nix run nixpkgs#nix-fast-build -- \
          --flake ".#checks.x86_64-linux" \
          --skip-cached \
          --no-nom \
          --impure
