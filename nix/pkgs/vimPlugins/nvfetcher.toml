# Sources for the custom neovim plugins, tracked by nvfetcher.
#
# Each entry tracks the latest commit on the upstream default branch; the daily
# `update.yml` workflow re-runs nvfetcher, rebuilds `checks.default` (which boots
# headless nvim with the set), and only commits the regenerated `_sources/` when
# that passes. Regenerate locally with:
#
#   nix develop -c nvfetcher -c nix/pkgs/vimPlugins/nvfetcher.toml -o nix/pkgs/vimPlugins/_sources
#
# NOTE: the NvChad set (nix/pkgs/nvchad) is intentionally NOT tracked here - its
# revs are hand-pinned for the v2.5-core / v3.0-ui compat documented in
# nix/pkgs/nvchad/NOTES.md. It could be migrated under nvfetcher later if that
# pinning is relaxed.

